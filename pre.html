<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Cadastro - Vôlei BNH</title>
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="pre.css?v=1.1">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">

     <style>
      
      * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

       

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

       

        .login-box {
            background-color: white;
            
           
            width: 100%;
        
            text-align: center;
            
        }

        .logo {
            margin-bottom: 1.5rem;
            color: #3498db;
        }

        .logo i {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            animation: spin 8s linear infinite;
        }

        .logo h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: #666;
            font-size: 0.9rem;
            font-style: italic;
        }

       

        @media (max-width: 500px) {
           

            .logo i {
                font-size: 2.5rem;
            }

            .logo h1 {
                font-size: 1.5rem;
            }
           
        }
    </style>

</head>
<body>
    
    
    <div class="container2">
        <div class="container">
      
        <div class="login-box">

            <div class="logo">
                <i class="fas fa-volleyball-ball"></i>
                <h1>Vôlei-BNH</h1>
               
            </div>
            </div>
            
            <div class="section">
                <h2 class="section-title"><i class="fas fa-user-edit"></i> Cadastro de Integrante</h2>
               
                <form id="playerForm">
                    <div class="form-group">
                        <label for="name">Nome e Apelido:</label>
                        <input type="text" id="name" placeholder="Ex: Ronaldo Fenômeno" maxlength="20" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" required>
                        <small>Este será usado para criar sua senha depois</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="imageFile">Foto:</label>
                        <input type="file" id="imageFile" accept="image/*" required>
                        <img id="imagePreview" class="image-preview" alt="Pré-visualização da imagem">
                        <div id="editorTrigger" style="display: none;">
                            <button type="button" class="upload-btn" id="editImageBtn">
                                <i class="fas fa-edit"></i> Ajustar Imagem
                            </button>
                        </div>
                        <div class="image-editor-container" id="imageEditorContainer">
                            <h3>Ajuste sua foto</h3>
                            <p>Mova e redimensione a área de corte como desejar</p>
                            <div id="cropper-container"></div>
                            <div class="editor-tools" style="align-items: baseline;">
                                <button class="cancel-btn" id="cancelEditBtn"><i class="fas fa-times"></i> Cancelar</button>
                                <button class="confirm-btn" id="confirmEditBtn"><i class="fas fa-check"></i> Confirmar</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="position">Posição Principal:</label>
                        <select id="position" required>
                            <option value="">Selecione uma posição</option>
                            <option value="Levantador">Levantador</option>
                            <option value="Ponteiro">Ponteiro</option>
                            <option value="Oposto">Oposto</option>
                            <option value="Central">Central</option>
                            <option value="Líbero">Líbero</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="contact">Telefone (com DDD):</label>
                        <input type="tel" id="contact" pattern="\([0-9]{2}\) [0-9]{4,5}-[0-9]{4}" placeholder="(99) 99999-9999" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Categoria:</label>
                        <select id="category" required>
                            <option value="">Selecione uma categoria</option>                        
                            <option value="MENSAL">MENSAL</option>
                            <option value="DIARIA">DIARIA</option>
                        </select>
                    </div>
                    
                    <button type="submit" id="saveBtn" style="background-color: #4285f4; width: auto;"><i class="fas fa-save"></i> Salvar</button>                
                    <button type="button" id="clearBtn" style="background-color: #ff5722;"><i class="fas fa-soap"></i> Limpar</button>
                    <button type="button" id="sairBtn" style="background-color: #4285f4;"><i class="fas fa-times "></i> Voltar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWMgLaPMpNOdPW10S-bVVEiQW-r3QCkxg",
            authDomain: "volei-25301.firebaseapp.com",
            databaseURL: "https://volei-25301-default-rtdb.firebaseio.com",
            projectId: "volei-25301",
            storageBucket: "volei-25301.firebasestorage.app",
            messagingSenderId: "1007197261034",
            appId: "1:1007197261034:web:f2c7ab9cb2793a694cdb93",
            measurementId: "G-CYMLX0SJJQ"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const storage = getStorage(app);

        const playerForm = document.getElementById('playerForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const imageFileInput = document.getElementById('imageFile');
        const positionInput = document.getElementById('position');
        const contactInput = document.getElementById('contact');
        const categoryInput = document.getElementById('category');
        const imagePreview = document.getElementById('imagePreview');
        const editImageBtn = document.getElementById('editImageBtn');
        const editorTrigger = document.getElementById('editorTrigger');
        const clearBtn = document.getElementById('clearBtn');
        
        const imageEditorContainer = document.getElementById('imageEditorContainer');
        const cropperContainer = document.getElementById('cropper-container');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const confirmEditBtn = document.getElementById('confirmEditBtn');
        
        let cropper;
        let originalImageFile;

   /* comentei pois é mais uma possibilidade
         document.getElementById("sairBtn").addEventListener("click", function() {
    window.history.back();
  });
*/
  document.getElementById("sairBtn").addEventListener("click", function() {
    window.location.href = "loginvl.html";
  });

        contactInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 0) {
                value = '(' + value;
            }
            if (value.length > 3) {
                value = value.substring(0, 3) + ') ' + value.substring(3);
            }
            if (value.length > 10) {
                value = value.substring(0, 10) + '-' + value.substring(10, 14);
            }
            e.target.value = value;
        });

        imageFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Erro',
                        text: 'A imagem deve ter no máximo 5MB.',
                        confirmButtonText: 'OK'
                    });
                    return;
                }
                if (!file.type.startsWith('image/')) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Erro',
                        text: 'Por favor, selecione um arquivo de imagem.',
                        confirmButtonText: 'OK'
                    });
                    return;
                }
                
                originalImageFile = file;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        if (img.width > 1024 || img.height > 1024) {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const maxSize = 1024;
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > maxSize) {
                                    height *= maxSize / width;
                                    width = maxSize;
                                }
                            } else {
                                if (height > maxSize) {
                                    width *= maxSize / height;
                                    height = maxSize;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            ctx.drawImage(img, 0, 0, width, height);
                            canvas.toBlob((blob) => {
                                const resizedFile = new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() });
                                originalImageFile = resizedFile;
                                const dataTransfer = new DataTransfer();
                                dataTransfer.items.add(resizedFile);
                                imageFileInput.files = dataTransfer.files;
                                imagePreview.src = canvas.toDataURL('image/jpeg', 0.8);
                                imagePreview.style.display = 'block';
                                editorTrigger.style.display = 'block';
                            }, 'image/jpeg', 0.8);
                        } else {
                            imagePreview.src = e.target.result;
                            imagePreview.style.display = 'block';
                            editorTrigger.style.display = 'block';
                        }
                    };
                };
                reader.readAsDataURL(file);
            } else {
                imagePreview.style.display = 'none';
                editorTrigger.style.display = 'none';
            }
        });

        editImageBtn.addEventListener('click', () => {
            if (!originalImageFile) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                cropperContainer.innerHTML = '<img id="imageToCrop" style="max-width: 100%; max-height: 100%;">';
                const imageToCrop = document.getElementById('imageToCrop');
                imageToCrop.src = e.target.result;
                
                imageToCrop.onload = () => {
                    if (cropper) cropper.destroy();
                    
                    cropper = new Cropper(imageToCrop, {
                        aspectRatio: 1,
                        viewMode: 1,
                        autoCropArea: 0.8,
                        responsive: true,
                        restore: false,
                        checkCrossOrigin: false,
                        checkOrientation: true,
                        modal: true,
                        guides: true,
                        center: true,
                        highlight: true,
                        background: true,
                        movable: true,
                        rotatable: true,
                        scalable: true,
                        zoomable: true,
                        zoomOnTouch: true,
                        zoomOnWheel: true,
                        wheelZoomRatio: 0.1,
                        cropBoxMovable: true,
                        cropBoxResizable: true,
                        toggleDragModeOnDblclick: true,
                        minCanvasWidth: 100,
                        minCanvasHeight: 100,
                        minCropBoxWidth: 100,
                        minCropBoxHeight: 100,
                        minContainerWidth: 300,
                        minContainerHeight: 200,
                        
                        ready() {
                            imageEditorContainer.style.display = 'block';
                            const containerData = cropper.getContainerData();
                            const cropBoxWidth = Math.min(containerData.width, containerData.height) * 0.8;
                            cropper.setCropBoxData({
                                width: cropBoxWidth,
                                height: cropBoxWidth
                            });
                        }
                    });
                };
            };
            reader.readAsDataURL(originalImageFile);
        });

        cancelEditBtn.addEventListener('click', () => {
            imageEditorContainer.style.display = 'none';
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
        });

        confirmEditBtn.addEventListener('click', async () => {
            if (cropper) {
                const canvas = cropper.getCroppedCanvas({
                    width: 300,
                    height: 300,
                    minWidth: 256,
                    minHeight: 256,
                    maxWidth: 1024,
                    maxHeight: 1024,
                    fillColor: '#fff',
                    imageSmoothingEnabled: true,
                    imageSmoothingQuality: 'high',
                });

                canvas.toBlob((blob) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        imagePreview.src = e.target.result;
                        imagePreview.style.display = 'block';
                        
                        const editedFile = new File([blob], originalImageFile.name, {
                            type: 'image/jpeg',
                            lastModified: Date.now()
                        });
                        
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(editedFile);
                        imageFileInput.files = dataTransfer.files;
                        
                        originalImageFile = editedFile;
                    };
                    reader.readAsDataURL(blob);
                    
                    imageEditorContainer.style.display = 'none';
                    cropper.destroy();
                    cropper = null;
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Imagem ajustada!',
                        text: 'Sua foto foi editada com sucesso.',
                        timer: 1500,
                        showConfirmButton: false
                    });
                }, 'image/jpeg', 0.7);
            }
        });

        // Função LIMPAR FORMULÁRIO
        clearBtn.addEventListener('click', () => {
            playerForm.reset();
            imagePreview.style.display = 'none';
            imagePreview.src = '';
            editorTrigger.style.display = 'none';
            imageEditorContainer.style.display = 'none';
            imageFileInput.value = '';
            
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
            
            originalImageFile = null;
            
            Swal.fire({
                icon: 'info',
                title: 'Formulário limpo',
                text: 'Todos os campos foram resetados.',
                timer: 1500,
                showConfirmButton: false
            });
        });

        playerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cadastrando...';

            Swal.fire({
                title: 'Aguarde...',
                text: 'Realizando o pré-cadastro...',
                allowOutsideClick: false,
                allowEscapeKey: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            try {
                const file = imageFileInput.files[0];
                let imageUrl = null;

                if (file) {
                    const storagePath = `players/${Date.now()}_${file.name}`;
                    const fileRef = storageRef(storage, storagePath);
                    await uploadBytes(fileRef, file);
                    imageUrl = await getDownloadURL(fileRef);
                }

                const playerData = {
                    name: nameInput.value,
                    email: emailInput.value.trim(),
                    imageUrl: imageUrl,
                    position: positionInput.value,
                    contact: contactInput.value,
                    category: categoryInput.value,
                    pendingAccount: true,
                    createdAt: new Date().toISOString()
                };

                const newPlayerRef = push(ref(database, 'players'));
                await set(newPlayerRef, playerData);

                Swal.fire({
                    icon: 'success',
                    title: 'Sucesso!',
                    text: 'Pré-cadastro realizado com sucesso! Redirecionando para criar senha...',
                    timer: 1500,
                    showConfirmButton: false
                });

                setTimeout(() => {
                    window.location.href = `criar_login.html?email=${encodeURIComponent(playerData.email)}`;
                }, 1500);

            } catch (error) {
                console.error("Erro no pré-cadastro:", error);
                Swal.fire({
                    icon: 'error',
                    title: 'Erro',
                    text: 'Falha no pré-cadastro: ' + error.message,
                    confirmButtonText: 'OK'
                });
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Cadastrar';
            }
        });
    </script>
</body>
</html>
